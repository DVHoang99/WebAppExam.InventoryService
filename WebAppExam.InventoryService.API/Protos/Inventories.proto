syntax = "proto3";

option csharp_namespace = "WebAppExam.InventoryService.API.Protos";
service InventoryGrpc {
  rpc GetBatchInventories (GetBatchInventoriesRequest) returns (GetBatchInventoriesResponse);
}

message GetBatchInventoriesRequest {
  repeated string ids = 1;
}

message GetBatchInventoriesResponse {
    repeated InventoryDTO inventories = 1;
}

message InventoryDTO {
    string ProductId = 1;
    int32 StockQuantity = 2;
    string CorrelationId = 3;
    string WareHouseId = 4;
    WareHouseDTO WareHouse = 5;
}

message WareHouseDTO {
    string id = 1;
    string address = 2;
    string owner_name = 3;
    string owner_email = 4;
    string owner_phone = 5;
}

